name: Android Demo Build

on:
  push:
    branches:
      - master
    paths:
      - 'AndroidDemo/**'
      - '.github/workflows/android-demo-build.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'AndroidDemo/**'
      - '.github/workflows/android-demo-build.yml'
  workflow_dispatch:

jobs:
  build-android-demo:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AndroidDemo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"
          sdkmanager --licenses || true

      - name: Download model to assets
        shell: bash
        run: |
          mkdir -p app/src/main/assets/models
          MODEL_URL="https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin"
          echo "Downloading model: $MODEL_URL"
          curl -L --fail --retry 3 "$MODEL_URL" -o app/src/main/assets/models/ggml-model.bin
          ls -lh app/src/main/assets/models/ggml-model.bin

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-demo-release-tiny
          path: |
            AndroidDemo/app/build/outputs/apk/release/*.apk
